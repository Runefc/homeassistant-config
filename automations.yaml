- id: '1702384327396'
  alias: Bathroom - ventilator tænd 30 min
  description: Short press adds 30 min (max 2h), long press stops immediately
  triggers:
  - device_id: a4af2a493a10cac9d50bda1ac6224049
    domain: zha
    type: remote_button_short_press
    subtype: remote_button_short_press
    trigger: device
    id: short_press
  - device_id: a4af2a493a10cac9d50bda1ac6224049
    domain: zha
    type: remote_button_long_press
    subtype: remote_button_long_press
    trigger: device
    id: long_press
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: long_press
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.bathroom_ventilator
      - action: input_number.set_value
        target:
          entity_id: input_number.ventilator_end_timestamp
        data:
          value: 0
    default:
    - variables:
        current_end: '{{ states(''input_number.ventilator_end_timestamp'') | float(0)
          }}'
        new_end: "{% set now_ts = as_timestamp(now()) %} {% if is_state('switch.bathroom_ventilator',
          'on') and current_end > now_ts %}\n  {{ [current_end + 1800, now_ts + 7200]
          | min }}\n{% else %}\n  {{ now_ts + 1800 }}\n{% endif %}\n"
    - action: input_number.set_value
      target:
        entity_id: input_number.ventilator_end_timestamp
      data:
        value: '{{ new_end }}'
    - action: switch.turn_on
      target:
        entity_id: switch.bathroom_ventilator
    - wait_template: '{{ as_timestamp(now()) >= states(''input_number.ventilator_end_timestamp'')
        | float }}'
      timeout:
        hours: 2
      continue_on_timeout: true
    - action: switch.turn_off
      target:
        entity_id: switch.bathroom_ventilator
    - action: input_number.set_value
      target:
        entity_id: input_number.ventilator_end_timestamp
      data:
        value: 0
  mode: restart
