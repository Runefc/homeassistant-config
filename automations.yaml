- id: '1779453674001'
  alias: Devices - Badeværelse - Ventilator styret af luftfugtighed
  description: Tænder ventilator automatisk når luftfugtighed overstiger 65%. Slukker
    når den falder under 55%.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.bathroom_thermometer_humidity
    above: 65
    id: fugtig
  - trigger: numeric_state
    entity_id: sensor.bathroom_thermometer_humidity
    below: 55
    id: tor
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: fugtig
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.bathroom_ventilator
    - conditions:
      - condition: trigger
        id: tor
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.bathroom_ventilator
  mode: single
