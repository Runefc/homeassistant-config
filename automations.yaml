- id: '1777360153391'
  alias: Lys - Fade op gradvis underetage morgen
  description: 'At 06:00, if lights are already on, gradually transition to bright
    scenes. If lights are turned on after 06:00 (before 07:00), gradually transition
    to bright. Hallway only fades if kitchen or living room is also on.

    '
  triggers:
  - trigger: time
    at: 06:00:00
    id: morning_time
  - trigger: state
    entity_id: light.hallway_1
    to: 'on'
    id: hallway_turned_on
  - trigger: state
    entity_id: light.kitchen
    to: 'on'
    id: kitchen_turned_on
  - trigger: state
    entity_id: light.living_room
    to: 'on'
    id: living_room_turned_on
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: morning_time
      sequence:
      - if:
        - condition: state
          entity_id: light.hallway_1
          state: 'on'
        - condition: or
          conditions:
          - condition: state
            entity_id: light.kitchen
            state: 'on'
          - condition: state
            entity_id: light.living_room
            state: 'on'
        then:
        - action: scene.turn_on
          data:
            transition: 300
          target:
            entity_id: scene.hallway_bright
      - if:
        - condition: state
          entity_id: light.kitchen
          state: 'on'
        then:
        - action: scene.turn_on
          data:
            transition: 300
          target:
            entity_id: scene.kitchen_bright
      - if:
        - condition: state
          entity_id: light.living_room
          state: 'on'
        then:
        - action: scene.turn_on
          data:
            transition: 300
          target:
            entity_id: scene.living_room_bright
    - conditions:
      - condition: trigger
        id: hallway_turned_on
      - condition: time
        after: 06:00:00
        before: 07:00:00
      - condition: or
        conditions:
        - condition: state
          entity_id: light.kitchen
          state: 'on'
        - condition: state
          entity_id: light.living_room
          state: 'on'
      sequence:
      - delay:
          seconds: 2
      - action: scene.turn_on
        data:
          transition: 300
        target:
          entity_id: scene.hallway_bright
    - conditions:
      - condition: trigger
        id: kitchen_turned_on
      - condition: time
        after: 06:00:00
        before: 07:00:00
      sequence:
      - delay:
          seconds: 2
      - action: scene.turn_on
        data:
          transition: 300
        target:
          entity_id: scene.kitchen_bright
    - conditions:
      - condition: trigger
        id: living_room_turned_on
      - condition: time
        after: 06:00:00
        before: 07:00:00
      sequence:
      - delay:
          seconds: 2
      - action: scene.turn_on
        data:
          transition: 300
        target:
          entity_id: scene.living_room_bright
  mode: parallel
  max: 10
- id: '1777364103954'
  alias: Notifikation - Start opvasker
  description: Send notification at 20:00, start dishwasher at midnight if confirmed
  triggers:
  - trigger: time
    at: '20:00:00'
  conditions:
  - condition: device
    type: is_off
    device_id: 8106b6292e9f69e717fc9c700abf119b
    entity_id: a3cead478324cf25892607f9fa023228
    domain: switch
  actions:
  - alias: Ask if dishwasher should be started
    domain: mobile_app
    type: notify
    device_id: 6b2348f85663897cf7acb6e717a396bd
    title: Opvasker
    message: Ikke tændt - Er den fyldt og skal startes?
    data:
      actions:
      - action: CONFIRM_DISHWASHER
        title: Ja
      - action: DISMISS_DISHWASHER
        title: Nej
  - alias: Wait for response
    wait_for_trigger:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: CONFIRM_DISHWASHER
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: DISMISS_DISHWASHER
    timeout:
      hours: 1
    continue_on_timeout: false
  - alias: Stop if dismissed
    if:
    - condition: template
      value_template: '{{ wait.trigger.event.data.action == ''DISMISS_DISHWASHER''
        }}'
    then:
    - stop: User dismissed the notification
  - alias: Wait until midnight
    wait_template: '{{ now().hour == 0 and now().minute == 0 }}'
    timeout:
      hours: 5
  - alias: Power on dishwasher
    action: switch.turn_on
    target:
      entity_id: switch.opvaskemaskine_power
  - delay:
      seconds: 5
  - alias: Activate Brilliance Dry
    action: switch.turn_on
    target:
      entity_id: switch.opvaskemaskine_brilliance_dry
  - delay:
      seconds: 3
  - alias: Start Eco 50 program
    action: select.select_option
    target:
      entity_id: select.opvaskemaskine_active_program
    data:
      option: dishcare_dishwasher_program_eco_50
  - delay:
      seconds: 3
  - alias: Enable child lock
    action: switch.turn_on
    target:
      entity_id: switch.opvaskemaskine_child_lock
  mode: single
