light_sunrise:
  alias: Light Sunrise
  use_blueprint:
    path: steku/parabolic_alarm_script.yaml
  description: ''
lys_putning_scene:
  alias: Putning scene
  sequence:
  - repeat:
      for_each:
      - entity: light.living_room
        brightness: 141
        color_temp_kelvin: 2237
      - entity: light.kitchen
        brightness: 103
        color_temp_kelvin: 2702
      - entity: light.staircase
        brightness: 77
        color_temp_kelvin: 2702
      - entity: light.bathroom
        brightness: 77
        color_temp_kelvin: 2710
      - entity: light.hallway_4
        brightness: 104
        color_temp_kelvin: 2710
      sequence:
      - if:
        - condition: template
          value_template: '{{ is_state(repeat.item.entity, ''on'') }}'
        then:
        - action: light.turn_on
          target:
            entity_id: '{{ repeat.item.entity }}'
          data:
            brightness: '{{ repeat.item.brightness }}'
            color_temp_kelvin: '{{ repeat.item.color_temp_kelvin }}'
            transition: 300
        - delay:
            milliseconds: 500
  mode: single
tjek_alarm_status:
  alias: Tjek alarm-status
  sequence:
  - device_id: 6b2348f85663897cf7acb6e717a396bd
    domain: mobile_app
    type: notify
    data:
      channel: Alert
      importance: high
    title: 'Alarm: Status'
    message: "{%- set ns = namespace(names=[]) -%} {%- for s in states.binary_sensor
      if s.state == 'on' -%}\n  {%- set dc = s.attributes.device_class | default('')
      -%}\n  {%- if dc in ['door', 'window', 'opening', 'garage_door']\n       or
      'dor' in s.entity_id\n       or 'vindue' in s.entity_id -%}\n    {%- set ns.names
      = ns.names + [s.name] -%}\n  {%- endif -%}\n{%- endfor -%} {% if ns.names |
      count > 0 -%} Følgende er åbne: {{ ns.names | join(', ') }} {%- else -%} Klar
      til at armere — ingen åbne sensorer {%- endif %}"
  mode: single
  description: ''
