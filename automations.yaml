- id: '1779452731411'
  alias: Varme - Anna - Pause ved åbent vindue
  description: Sætter gulvvarme på pause når et vindue er åbent i mere end 5 minutter.
    Genoptager når alle vinduer er lukket, eller efter 4 timer.
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.anna_vindue_1_opening_2
    - binary_sensor.anna_vindue_2_opening_2
    to: 'on'
    for:
      minutes: 5
  conditions: []
  actions:
  - action: climate.set_hvac_mode
    target:
      entity_id: climate.anna_thermostat
    data:
      hvac_mode: 'off'
  - wait_for_trigger:
    - trigger: template
      value_template: "{{ is_state('binary_sensor.anna_vindue_1_opening_2', 'off')
        and\n   is_state('binary_sensor.anna_vindue_2_opening_2', 'off') }}\n"
    timeout:
      hours: 4
    continue_on_timeout: true
  - action: climate.set_hvac_mode
    target:
      entity_id: climate.anna_thermostat
    data:
      hvac_mode: heat
  mode: restart
