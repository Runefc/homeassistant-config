- id: vacation_activate
  alias: Ferie - Aktiver
  description: Sets thermostats to away preset and disables night setback during vacation
  triggers:
  - trigger: state
    entity_id: input_boolean.vacation_mode
    from: 'off'
    to: 'on'
  actions:
  - if:
    - condition: template
      value_template: '{{ as_timestamp(states(''input_datetime.vacation_return''),
        0) < as_timestamp(now()) + 43200 }}

        '
    then:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.vacation_mode
    - device_id: 6b2348f85663897cf7acb6e717a396bd
      domain: mobile_app
      type: notify
      title: 'Ferie: Fejl'
      message: Sæt hjemkomst dato mere end 12 timer frem, og prøv igen.
      data:
        channel: Alert
    - stop: ''
  - action: automation.turn_off
    target:
      entity_id:
      - automation.varme_natsaenkning
      - automation.notifikation_start_opvasker
    data:
      stop_actions: false
  - action: climate.set_preset_mode
    target:
      entity_id:
      - climate.kitchen_thermostat
      - climate.office_thermostat
      - climate.anna_thermostat
      - climate.bathroom_thermostat
      - climate.stue
    data:
      preset_mode: away
  - device_id: 6b2348f85663897cf7acb6e717a396bd
    domain: mobile_app
    type: notify
    title: 'Ferie: Aktiveret'
    message: 'Termostater sat til ''away'' og natsænkning deaktiveret. Varme genoptages
      {{ (as_timestamp(states(''input_datetime.vacation_return'')) - 43200) | timestamp_custom(''%d/%m
      kl. %H:%M'') }}.

      '
    data:
      channel: Alert
  mode: single
- id: vacation_restore
  alias: Ferie - Gendan varme
  description: Restores thermostats to home preset and re-enables night setback 12
    hours before return
  triggers:
  - trigger: template
    value_template: '{% set secs = as_timestamp(states(''input_datetime.vacation_return''),
      0) - as_timestamp(now()) %} {{ is_state(''input_boolean.vacation_mode'', ''on'')
      and secs > 0 and secs <= 43200 }}

      '
  actions:
  - action: climate.set_preset_mode
    target:
      entity_id:
      - climate.kitchen_thermostat
      - climate.office_thermostat
      - climate.anna_thermostat
      - climate.bathroom_thermostat
      - climate.stue
    data:
      preset_mode: home
  - action: automation.turn_on
    target:
      entity_id:
      - automation.varme_natsaenkning
      - automation.notifikation_start_opvasker
    data: {}
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.vacation_mode
  mode: single
